name: secret-scan-gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan-gate:
    uses: cinatra-ai/ci/.github/workflows/secret-scan-gate.yml@a8677e50ba02fcb11929e94c70fb5ba96a8ea3ae # v0.1.0
    with:
      # On pull_request the PR base/head SHAs are present; on push to main the
      # pull_request context is empty, so fall back to the push range SHAs
      # (github.event.before = prior tip, github.sha = pushed tip) so the scan
      # still gets a real base..head range instead of empty inputs.
      base_sha: ${{ github.event.pull_request.base.sha || github.event.before }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
